<!doctype html>
<html lang="es">
  <head>
    <title>Jardín Zen con Bong Estilizado</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/addons/"
        }
      }
    </script>
    <style>
      body { margin: 0; background-color: #b3e5fc; overflow: hidden; }
    </style>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

class EscenaJardinZen extends xb.Script {
  constructor() {
    super();
    this.petalosSakura = [];
    this.arbolesInteractivos = []; 
    this.objetoBong = null;
    this.bloqueoInteraccion = false;
  }

  init() {
    this.add(new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 1.5));
    const sol = new THREE.DirectionalLight(0xffffff, 2.0);
    sol.position.set(10, 20, 10);
    this.add(sol);

    const escenaGrupo = new THREE.Group();
    escenaGrupo.position.set(0, 0, -1.5); 
    this.add(escenaGrupo);

    this.crearEntorno(escenaGrupo);
    this.crearBong(escenaGrupo);
    xb.core.input.addReticles();
  }

  crearEntorno(grupo) {
    const terreno = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 3), new THREE.MeshLambertMaterial({ color: 0x558b2f }));
    grupo.add(terreno);
  }

  crearBong(grupo) {
    const matVidrio = new THREE.MeshPhysicalMaterial({ 
      color: 0x88ccff, 
      transparent: true, 
      opacity: 0.7, 
      metalness: 0.1, 
      roughness: 0.1,
      side: THREE.DoubleSide 
    });
    
    // Geometría del bong estilizado
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.15, 16), matVidrio);
    base.position.set(0, 0.075, 0);
    
    const cuello = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.35, 16), matVidrio);
    cuello.position.set(0, 0.35, 0);
    
    const tuboLateral = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.12, 8), matVidrio);
    tuboLateral.rotation.z = Math.PI / 3;
    tuboLateral.position.set(0.08, 0.2, 0);

    this.objetoBong = new THREE.Group();
    this.objetoBong.add(base);
    this.objetoBong.add(cuello);
    this.objetoBong.add(tuboLateral);
    this.objetoBong.position.set(0, 0.1, 0);
    this.objetoBong.userData = { esObjetoZen: true };
    
    grupo.add(this.objetoBong);
  }

  onSelectStart(event) {
    const controlador = event.target;
    if (this.objetoBong && xb.core.user.select(this.objetoBong, controlador)) {
      if (!this.bloqueoInteraccion) {
        this.bloqueoInteraccion = true;
        // Animación de feedback
        this.objetoBong.rotation.z = 0.3;
        setTimeout(() => { 
          this.objetoBong.rotation.z = 0; 
          this.bloqueoInteraccion = false;
        }, 300);
      }
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const opciones = new xb.Options();
  opciones.enableUI();
  opciones.setAppTitle('Jardín Zen con Bong');
  xb.add(new EscenaJardinZen());
  xb.init(opciones);
});
</script>
  </body>
</html>
