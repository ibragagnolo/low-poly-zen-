<html lang="es">
  <head>
    <title>Mi Jardín Japonés XR | Zen Haven</title>

    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/addons/"
        }
      }
    </script>
    <style>
      body { margin: 0; background-color: #b3e5fc; overflow: hidden; }
    </style>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as xb from 'xrblocks';

class EscenaJardinPrimeraPersona extends xb.Script {
  constructor() {
    super();
    this.petalosSakura = [];
    this.arbolesInteractivos = []; 
    this.objetoGong = null;
    this.contextoAudio = null;
    this.bloqueoGong = false;
  }

  iniciarAudio() {
    if (!this.contextoAudio) this.contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
    if (this.contextoAudio.state === 'suspended') this.contextoAudio.resume();
  }

  sonarGong() {
    this.iniciarAudio();
    const t = this.contextoAudio.currentTime;
    const frec = 90;
    [1.0, 1.3, 1.8, 2.5].forEach((ratio, i) => {
      const osc = this.contextoAudio.createOscillator();
      const gain = this.contextoAudio.createGain();
      osc.frequency.value = frec * ratio;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4 / (i + 1), t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 4);
      osc.connect(gain);
      gain.connect(this.contextoAudio.destination);
      osc.start(t);
      osc.stop(t + 4);
    });
  }

  init() {
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    const escenaGrupo = new THREE.Group();
    escenaGrupo.position.set(0, 0, -1.5); 
    this.add(escenaGrupo);

    this.crearEntornoProcedural(escenaGrupo);
    xb.core.input.addReticles();
  }

  crearEntornoProcedural(grupo) {
    const terreno = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 3), new THREE.MeshLambertMaterial({ color: 0x558b2f }));
    grupo.add(terreno);
    this.colocarGong(grupo);
  }

  colocarGong(grupo) {
    const estructura = new THREE.Group();
    estructura.position.set(0, 0.7, 0);

    const matMadera = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matMetal = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.3 });

    // Marcos laterales
    const poste = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6), matMadera);
    poste.position.x = -0.3;
    estructura.add(poste);
    const poste2 = poste.clone();
    poste2.position.x = 0.3;
    estructura.add(poste2);

    // Viga superior
    const viga = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), matMadera);
    viga.position.y = 0.3;
    estructura.add(viga);

    // Disco del Gong
    const gongDisco = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.03, 16, 32), matMetal);
    gongDisco.position.y = 0.15;
    estructura.add(gongDisco);
    
    const caraGong = new THREE.Mesh(new THREE.CircleGeometry(0.15, 32), matMetal);
    caraGong.position.y = 0.15;
    estructura.add(caraGong);

    this.objetoGong = caraGong;
    this.objetoGong.userData = { esGong: true };
    grupo.add(estructura);
  }

  onSelectStart(event) {
    const golpe = xb.core.user.select(this.objetoGong, event.target);
    if (golpe && !this.bloqueoGong) {
      this.bloqueoGong = true;
      this.sonarGong();
      this.objetoGong.scale.setScalar(1.2);
      setTimeout(() => { this.objetoGong.scale.setScalar(1); this.bloqueoGong = false; }, 300);
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const op = new xb.Options();
  xb.add(new EscenaJardinPrimeraPersona());
  xb.init(op);
});
</script>
  </body>
</html>
