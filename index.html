<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "xrblocks": "https://cdn.jsdelivr.net/gh/google/xrblocks@v0.1.1/build/xrblocks.module.js"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as xb from 'xrblocks';

        class EscenaJardin extends xb.Script {
            init() {
                // 1. MEJORES LUCES (Día despejado)
                const luzCielo = new THREE.HemisphereLight(0xddeeff, 0x444444, 4);
                this.add(luzCielo);

                const sol = new THREE.DirectionalLight(0xffffff, 3);
                sol.position.set(5, 10, 5);
                this.add(sol);

                // 2. PISO GRIS (Para no flotar)
                const sueloGeo = new THREE.PlaneGeometry(100, 100);
                const sueloMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
                const suelo = new THREE.Mesh(sueloGeo, sueloMat);
                suelo.rotation.x = -Math.PI / 2;
                suelo.position.y = -0.05; 
                this.add(suelo);

                // 3. CARGAR EL MODELO
                const loader = new GLTFLoader();
                // Asegúrate de que el archivo en GitHub se llame jardin.glb
                loader.load('jardin.glb', (gltf) => {
                    const modelo = gltf.scene;
                    
                    // Ajuste de escala y posición
                    modelo.scale.set(1, 1, 1); 
                    modelo.position.set(0, 0, -5); 

                    modelo.traverse((node) => {
                        if (node.isMesh) {
                            node.material.side = THREE.DoubleSide;
                        }
                    });

                    this.add(modelo);
                    console.log("¡Éxito! El jardín está en la escena.");
                }, undefined, (error) => {
                    console.error("Error al cargar el .glb:", error);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            xb.add(new EscenaJardin());
            xb.init(new xb.Options());
        });
    </script>
</body>
</html>
