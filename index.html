<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #aaccff; overflow: hidden; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "xrblocks": "https://modelviewer.dev/node_modules/@google/model-viewer/dist/model-viewer.min.js"
        }
      }
    </script>
</head>
<body>
    <model-viewer 
        src="jardin.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        poster="poster.webp" 
        shadow-intensity="2" 
        environment-image="neutral" 
        exposure="1.5"
        style="width: 100vw; height: 100vh;">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px;">
            👋 Activar XR (Ver en mi espacio)
        </button>
    </model-viewer>
</body>
</html>
