<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mi Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #aaccff; overflow: hidden; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "xrblocks": "https://cdn.jsdelivr.net/gh/google/xrblocks@main/build/xrblocks.module.js"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as xb from 'xrblocks';

        class EscenaJardinPrimeraPersona extends xb.Script {
            init() {
                // 1. ILUMINACIÓN DE DÍA (Sol potente como me pediste)
                const luzAmbiente = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 4);
                this.add(luzAmbiente);

                const sol = new THREE.DirectionalLight(0xffffff, 3);
                sol.position.set(10, 20, 10);
                this.add(sol);

                // 2. CARGAR TU MODELO ('low poly zen.glb')
                const loader = new GLTFLoader();
                loader.load('low poly zen.glb', (gltf) => {
                    const jardin = gltf.scene;
                    
                    // ESCALA 1:1 para que tenga tamaño real y puedas estar ADENTRO
                    jardin.scale.set(1, 1, 1);
                    
                    // Lo posicionamos en el origen para que nazcas adentro de él
                    jardin.position.set(0, 0, 0); 
                    
                    jardin.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) child.material.side = THREE.DoubleSide;
                        }
                    });
                    
                    this.add(jardin);
                    console.log("¡Jardín en primera persona cargado!");
                }, undefined, (error) => {
                    console.error('Error al cargar tu jardín:', error);
                });
            }
        }

        // Inicializamos XR Blocks con los controles de primera persona activos
        document.addEventListener('DOMContentLoaded', function () {
            const opciones = new xb.Options();
            // Activamos el simulador para que puedas moverte en la compu
            opciones.enableWebXrSimulator = true; 
            
            xb.add(new EscenaJardinPrimeraPersona());
            xb.init(opciones);
        });
    </script>
</body>
</html>
