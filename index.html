<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; background-color: #aaccff; overflow: hidden; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "xrblocks": "https://unpkg.com/xrblocks@0.1.1/build/xrblocks.module.js"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as xb from 'xrblocks';

        class EscenaJardin extends xb.Script {
            init() {
                // 1. LUCES DE DÍA POTENTES
                const luzCielo = new THREE.HemisphereLight(0xffffff, 0x777777, 4);
                this.add(luzCielo);

                const sol = new THREE.DirectionalLight(0xfffcaa, 3);
                sol.position.set(10, 20, 10);
                this.add(sol);

                // 2. PISO GRIS DE REFERENCIA
                const sueloGeo = new THREE.PlaneGeometry(100, 100);
                const sueloMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
                const suelo = new THREE.Mesh(sueloGeo, sueloMat);
                suelo.rotation.x = -Math.PI / 2;
                suelo.position.y = -0.01; 
                this.add(suelo);

                // 3. CARGA DEL MODELO 3D
                const loader = new GLTFLoader();
                // Revisa que tu archivo en GitHub se llame jardin.glb (en minúsculas)
                loader.load('jardin.glb', (gltf) => {
                    const modelo = gltf.scene;
                    
                    // Ajustamos tamaño y lo tiramos un poco hacia atrás para verlo de frente
                    modelo.scale.set(1, 1, 1); 
                    modelo.position.set(0, 0, -4); 

                    modelo.traverse((node) => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            if (node.material) node.material.side = THREE.DoubleSide;
                        }
                    });

                    this.add(modelo);
                    console.log("¡Éxito! El jardín se acopló a la escena.");
                }, undefined, (error) => {
                    console.error("Error al cargar el .glb:", error);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            xb.add(new EscenaJardin());
            xb.init(new xb.Options());
        });
    </script>
</body>
</html>
