<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mi Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/google/xrblocks@main/samples/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "xrblocks": "https://cdn.jsdelivr.net/gh/google/xrblocks@main/build/xrblocks.module.js"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as xb from 'xrblocks';

        class EscenaJardin extends xb.Script {
            init() {
                // 1. LUZ DE DÍA: Simula el cielo azul y el reflejo del suelo (Muy brillante)
                const luzSol = new THREE.HemisphereLight(0xddeeff, 0x4f4f4f, 5);
                this.add(luzSol);

                // 2. EL SOL: Luz directa blanca para generar volumen y sombras claras
                const solDirecto = new THREE.DirectionalLight(0xffffff, 4);
                solDirecto.position.set(10, 20, 10); // Posición alta para simular el mediodía
                this.add(solDirecto);

                // 3. Piso gris de referencia para no flotar en el vacío azul
                const sueloGeo = new THREE.PlaneGeometry(40, 40);
                const sueloMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.9 });
                const suelo = new THREE.Mesh(sueloGeo, sueloMat);
                suelo.rotation.x = -Math.PI / 2;
                suelo.position.y = -1.01;
                this.add(suelo);

                // 4. Carga del modelo
                const loader = new GLTFLoader();
                loader.load('jardin.glb', (gltf) => {
                    const jardin = gltf.scene;
                    
                    // Ajuste de escala por las dudas
                    jardin.scale.set(0.1, 0.1, 0.1);
                    jardin.position.set(0, -1, -3); 
                    
                    jardin.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            
                            // Forzamos a que los materiales reaccionen con fuerza a la nueva luz
                            if (child.material) {
                                child.material.side = THREE.DoubleSide;
                                child.material.needsUpdate = true;
                            }
                        }
                    });
                    
                    this.add(jardin);
                    console.log("¡El modelo jardin.glb se cargó con éxito con luces de día!");
                }, undefined, (error) => {
                    console.error('Error al cargar el archivo .glb:', error);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            xb.add(new EscenaJardin());
            xb.init(new xb.Options());
        });
    </script>
</body>
</html>
