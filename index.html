<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mi Jardín Japonés XR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/google/xrblocks@main/samples/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "xrblocks": "https://cdn.jsdelivr.net/gh/google/xrblocks@main/build/xrblocks.module.js"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as xb from 'xrblocks';

        class EscenaJardin extends xb.Script {
            init() {
                // 1. Iluminación ambiental potente para que no se vea oscuro
                const luzHemisferica = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 3);
                this.add(luzHemisferica);

                const luzDireccional = new THREE.DirectionalLight(0xffffff, 2);
                luzDireccional.position.set(5, 10, 7);
                this.add(luzDireccional);

                // 2. Un piso gris de referencia para saber dónde está el suelo
                const sueloGeo = new THREE.PlaneGeometry(20, 20);
                const sueloMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
                const suelo = new THREE.Mesh(sueloGeo, sueloMat);
                suelo.rotation.x = -Math.PI / 2;
                suelo.position.y = -1.01;
                this.add(suelo);

                // 3. Cargar tu modelo de Blender con el nombre exacto en minúsculas
                const loader = new GLTFLoader();
                loader.load('low poly zen.glb', (gltf) => {
                    const jardin = gltf.scene;
                    
                    // Escalamos a la décima parte por si el modelo quedó enorme en Blender
                    jardin.scale.set(0.1, 0.1, 0.1);
                    
                    // Lo centramos y lo bajamos un poco a la altura de los ojos
                    jardin.position.set(0, -1, -3); 
                    
                    // Forzamos a que se procesen correctamente todos los elementos internos
                    jardin.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            // Si los materiales pierden color, esto ayuda a mantenerlos visibles
                            if (child.material) child.material.side = THREE.DoubleSide;
                        }
                    });
                    
                    this.add(jardin);
                    console.log("¡El jardín se cargó correctamente!");
                }, undefined, (error) => {
                    console.error('Error al cargar el archivo .glb:', error);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            xb.add(new EscenaJardin());
            xb.init(new xb.Options());
        });
    </script>
</body>
</html>
